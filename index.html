<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIO EL GRABADOR</title>

<!--
REQUISITOS:

1) canciones.js debe definir:
const archivos = [
  "4 Non Blondes - What's Up.mp3",
  "ABBA - The Winner Takes It All.mp3",
  "Ace of Base - All That She Wants.mp3"
];

2) Estructura de carpetas:

index.html
canciones.js
radio.jpg
parlante.png
rejilla.png
ruedita4.gif
music01/
-->

<script src="canciones.js"></script>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#stage {
    position: fixed;
    width: 1920px;
    height: 1080px;
    left: 0;
    top: 0;
    transform-origin: top left;
    background: url('radio.jpg') no-repeat center center;
    background-size: 100% 100%;
    font-family: Arial, sans-serif;
}

/* TEXTO EN EL CASSETTE */
#texto {
    position: absolute;
    top: 33.8%;
    left: 49.6%;
    transform: translate(-50%, -50%);

    /* Tamaño del display */
    width: 450px;
    height: 64px;              /* un poco más alto para que entren bien */

    /* Centrado del contenido */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    /* Espaciado interno */
    box-sizing: border-box;
    padding: 4px 8px;          /* más espacio arriba y abajo */

    /* Pantalla LCD estilo reloj Casio */
    background: #aeb6a2;
    border: 4px solid #111;
    border-radius: 4px;

    /* Relieve del marco */
    box-shadow:
        5px -5px 4px 0 rgba(0,0,0,0.75) inset,
        -3px 0 4px 0 rgba(0,0,0,0.75) inset;

    overflow: hidden;
}

#titulo {
    width: 100%;
    height: 26px;
    line-height: 20px;

    font-size: 23px;
    font-weight: bold;
    text-align: center;

    color: #1f3fa0;
    text-shadow: 2px 2px 1px rgba(0,0,0,0.8);

    margin: 0 0 4px 0;
    padding: 0;
    text-transform: uppercase;

    /* Evita que el texto pase a una segunda línea */
    white-space: nowrap;

    /* Oculta lo que sobresale */
    overflow: hidden;

    /* Opcional: muestra ... al final si no entra */
    text-overflow: ellipsis;
}

#artista {
    width: 100%;
    height: 26px;
    line-height: 24px;         /* suficiente altura para descendentes */

    font-size: 23px;
    font-weight: bold;
    text-align: center;

    color: #111;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.5);

    margin: 0;
    padding: 0;
	text-transform: uppercase;

    overflow: hidden;
}

/* BOTÓN SIGUIENTE */
#right {
    position: absolute;
    top: 30%;
    right: 100px;
    transform: translateY(-50%);
    font-size: 80px;
    color: lime;
    cursor: pointer;
	
	border: 2px solid red;
	opacity: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-focus-ring-color: transparent;
}

#right:active {
    color: red;
}

/* PARLANTES */
.parlante {
    position: fixed;
    bottom: 90px;
    width: 500px;
    height: 500px;
    aspect-ratio: 1;
    border-radius: 50%;
    overflow: hidden;
    background: url('parlante.png') center/cover no-repeat;
    box-shadow: 0 0 5px dodgerblue;
}

.parlante.izq { left: 55px; }
.parlante.der { right: 55px; }

.parlante::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url('rejilla.png') center/cover no-repeat;
    pointer-events: none;
}
.parlante.hit {
    scale: 1.0025;
    box-shadow:
        0 -15px 15px blue,
        0 15px 15px red,
        15px 0 15px lime,
        -15px 0 15px yellow;
    filter: contrast(106%);

}




/* RELOJ */
#clock {
    position: absolute;
    bottom: 10px;
    left: 47%;
    background: rgba(169,169,169,0.9);
    color: black;
    padding: 1px 5px;
    font-weight: bold;
    white-space: nowrap;
    font-size: 27px;
    border-radius: 5px;
    border: 2px solid red;
    box-shadow:
        5px -5px 4px 0 rgba(0,0,0,0.75) inset,
        -3px 0 4px 0 rgba(0,0,0,0.75) inset;
}

/* RUEDITAS DEL CASSETTE */
#ruedita {
    position: absolute;
    width: 375px;
    height: 94px;
    top: 44.1%;
    left: 49.8%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}
</style>
</head>
<body>
<div id="stage">
<img id="ruedita" src="ruedita4.gif" alt="Rueditas">

<div id="texto">
    <div id="titulo">CARGANDO...</div>
    <div id="artista"></div>
</div>

<div id="clock">00:00:00</div>

<div id="right" title="Siguiente canción">▶</div>

<div class="parlante izq"></div>
<div class="parlante der"></div>

<audio id="audio"></audio>

<script>
/* =========================
   AUDIO ENGINE REAL
========================= */
let ctx, analyser, source, data;
let ready = false;
let ultimo = 0;
let tiempoHit = 0;

/* =========================
   ELEMENTOS
========================= */
const audio = document.getElementById("audio");
const tituloEl = document.getElementById("titulo");
const artistaEl = document.getElementById("artista");
const parlantes = document.querySelectorAll(".parlante");

/* =========================
   INIT AUDIO ANALYZER
========================= */
function initAudio(audioEl) {
    if (ready) return;

    ctx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = ctx.createAnalyser();
    analyser.fftSize = 128;

    data = new Uint8Array(analyser.frequencyBinCount);

    source = ctx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(ctx.destination);

    ready = true;
}

/* =========================
   LOOP REAL DE MUSICA
========================= */
function loopParlantes() {
    requestAnimationFrame(loopParlantes);

    if (!analyser || audio.paused) return;

    analyser.getByteFrequencyData(data);

    let sum = 0;
    for (let i = 0; i < data.length; i++) {
        sum += data[i];
    }

    const vol = sum / data.length;
    const diff = vol - ultimo;
    ultimo = vol;

    // 🔥 sensibilidad (ajustable)
    if (vol > 3 && diff > 0.5) {
        parlantes.forEach(p => p.classList.add("hit"));
        tiempoHit = Date.now();
    }

    if (Date.now() - tiempoHit > 35) {
        parlantes.forEach(p => p.classList.remove("hit"));
    }
}

/* =========================
   HISTORIAL
========================= */
const HISTORIAL_MAX = 20;
const historial = [];

/* =========================
   ESTADO
========================= */
let actual = null;
let iniciado = false;

/* =========================
   PROCESAR ARCHIVOS
========================= */
const canciones = archivos.map(nombre => {
    const base = nombre.replace(/\.mp3$/i, "").trim();
    const partes = base.split(" - ");

    return {
        artista: partes[0] ? partes[0].trim() : "",
        titulo: partes.slice(1).join(" - ").trim(),
        archivo: nombre
    };
});

/* =========================
   MOSTRAR INFO
========================= */
function mostrarInfo(c) {
    tituloEl.textContent = c.titulo || "Sin título";
    artistaEl.textContent = c.artista || "";
}

/* =========================
   ELEGIR CANCIÓN
========================= */
function elegirCancion() {
    let disponibles = canciones.filter(c =>
        !historial.includes(c.archivo)
    );

    if (disponibles.length === 0) disponibles = [...canciones];

    return disponibles[Math.floor(Math.random() * disponibles.length)];
}

/* =========================
   EFECTO INICIAL
========================= */
function efectoParlantes() {
    parlantes.forEach(p => p.classList.add("hit"));

    setTimeout(() => {
        parlantes.forEach(p => p.classList.remove("hit"));
    }, 120);
}

/* =========================
   REPRODUCIR
========================= */
function reproducir(c) {
    actual = c;

    mostrarInfo(c);

    const ruta = "music001/" + c.archivo;

    audio.src = ruta;
    audio.load();

    audio.play()
        .then(() => {
            console.log("OK:", ruta);

            initAudio(audio);

            if (ctx.state === "suspended") {
                ctx.resume();
            }

            loopParlantes();
        })
        .catch(err => {
            console.log("Error audio:", err);
        });

    historial.push(c.archivo);
    if (historial.length > HISTORIAL_MAX) historial.shift();

    efectoParlantes();
}

/* =========================
   SIGUIENTE
========================= */
function siguienteCancion() {
    reproducir(elegirCancion());
}

/* =========================
   EVENTOS
========================= */
document.getElementById("right").onclick = siguienteCancion;
audio.addEventListener("ended", siguienteCancion);

/* =========================
   INICIO
========================= */
function iniciar() {
    if (iniciado) return;
    iniciado = true;

    loopParlantes();
    siguienteCancion();
}

document.addEventListener("click", iniciar);
document.addEventListener("touchstart", iniciar);

/* =========================
   RELOJ
========================= */
function updateClock() {
    const now = new Date();

    const h = String(now.getHours()).padStart(2, "0");
    const m = String(now.getMinutes()).padStart(2, "0");
    const s = String(now.getSeconds()).padStart(2, "0");

    document.getElementById("clock").textContent =
        `${h}:${m}:${s}`;

    setTimeout(updateClock, 1000);
}

function ajustarEscala() {
    const stage = document.getElementById("stage");
    if (!stage) return;

    const scaleX = window.innerWidth / 1920;
    const scaleY = window.innerHeight / 1080;
    const scale = Math.min(scaleX, scaleY);

    stage.style.transform = "scale(" + scale + ")";
    stage.style.left = ((window.innerWidth - 1920 * scale) / 2) + "px";
    stage.style.top = ((window.innerHeight - 1080 * scale) / 2) + "px";

    document.body.style.overflow = "hidden";
    document.documentElement.style.overflow = "hidden";
}

window.addEventListener("load", ajustarEscala);
window.addEventListener("resize", ajustarEscala);
setTimeout(ajustarEscala, 100);
setTimeout(ajustarEscala, 500);
setTimeout(ajustarEscala, 1000);

updateClock();
</script>
</div>
</body>
</html>
